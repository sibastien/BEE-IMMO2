<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bee Solution &amp; Consulting - Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-page">
    <header class="topbar">
      <div>
        <p class="eyebrow">Bee Solution &amp; Consulting</p>
        <h1>Gestion des annonces</h1>
      </div>
      <div class="top-actions">
        <a class="secondary nav-link" href="/">Voir le site</a>
        <a class="secondary nav-link" href="/admin/requests">Demandes</a>
        <a class="secondary nav-link" href="/admin/blog">Blog</a>
        <a class="secondary nav-link" href="/admin/testimonials">Avis</a>
        <div class="api-status" id="apiStatus">Connexion...</div>
        <button class="secondary hidden" id="logoutButton" type="button">Deconnexion</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel login-panel" id="loginPanel">
        <div class="section-heading">
          <h2>Connexion admin</h2>
        </div>

        <form id="loginForm" autocomplete="off">
          <label>
            Email
            <input id="adminEmail" type="email" autocomplete="username" required />
          </label>

          <label>
            Mot de passe
            <input id="adminPassword" type="password" autocomplete="current-password" required />
          </label>

          <button class="primary" type="submit">Se connecter</button>
          <p class="form-message" id="loginMessage"></p>
        </form>
      </section>

      <section class="panel form-panel dashboard-panel">
        <div class="section-heading">
          <h2>Nouvelle annonce</h2>
          <button class="secondary" id="resetForm" type="button">Effacer</button>
        </div>

        <form id="propertyForm">
          <input type="hidden" id="propertyId" />

          <label>
            Titre
            <input id="title" name="title" type="text" required minlength="3" />
          </label>

          <label>
            Description
            <textarea id="description" name="description" rows="4" required minlength="10"></textarea>
          </label>

          <div class="grid-2">
            <label>
              Prix
              <input id="price" name="price" type="number" min="0" required />
            </label>

            <label>
              Surface
              <input id="surface" name="surface" type="number" min="0" required />
            </label>
          </div>

          <div class="grid-2">
            <label>
              Transaction
              <select id="transactionType" name="transactionType" required>
                <option value="sale">Vente</option>
                <option value="rent">Location</option>
              </select>
            </label>

            <label>
              Type de bien
              <select id="propertyType" name="propertyType" required>
                <option value="apartment">Appartement</option>
                <option value="house">Maison</option>
                <option value="villa">Villa</option>
                <option value="land">Terrain</option>
                <option value="commercial">Commercial</option>
              </select>
            </label>
          </div>

          <label class="rental-type-field hidden">
            Type de location
            <select id="rentalType" name="rentalType">
              <option value="standard">Location normale</option>
              <option value="summer">Location estivale</option>
              <option value="nightly">Nuitee</option>
            </select>
          </label>

          <div class="grid-2">
            <label>
              Ville
              <input id="city" name="city" type="text" required />
            </label>

            <label>
              Quartier
              <input id="district" name="district" type="text" required />
            </label>
          </div>

          <label>
            Adresse
            <input id="address" name="address" type="text" required />
          </label>

          <div class="grid-4">
            <label class="property-detail-field">
              Chambres
              <input id="bedrooms" name="bedrooms" type="number" min="0" required />
            </label>

            <label class="property-detail-field">
              Salles de bain
              <input id="bathrooms" name="bathrooms" type="number" min="0" required />
            </label>

            <label class="property-detail-field">
              Garages
              <input id="garages" name="garages" type="number" min="0" value="0" />
            </label>

            <label class="property-detail-field">
              Abris voiture
              <input id="abris" name="abris" type="number" min="0" value="0" />
            </label>
          </div>

          <label>
            Statut
            <select id="status" name="status">
              <option value="available">Disponible</option>
              <option value="sold">Vendue</option>
              <option value="rented">Louee</option>
            </select>
          </label>

          <label>
            Images
            <textarea id="images" name="images" rows="3" placeholder="Collez une URL par ligne, ou utilisez le bouton upload ci-dessous"></textarea>
          </label>

          <label>
            Ajouter des photos depuis l'ordinateur
            <input id="imageUpload" type="file" accept="image/*" multiple />
          </label>
          <div class="image-preview-grid" id="imagePreview" aria-live="polite"></div>

          <button class="primary" id="submitButton" type="submit">Ajouter l'annonce</button>
          <p class="form-message" id="formMessage"></p>
        </form>
      </section>

      <section class="panel list-panel dashboard-panel">
        <div class="section-heading">
          <div>
            <h2>Annonces</h2>
            <p id="propertyCount">0 annonce</p>
          </div>
          <button class="secondary" id="refreshButton" type="button">Actualiser</button>
        </div>

        <div class="properties" id="propertiesList"></div>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
