<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bee Consulting - Demandes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-page">
    <header class="topbar">
      <div>
        <p class="eyebrow">Bee Consulting</p>
        <h1>Demandes de visite</h1>
      </div>
      <div class="top-actions">
        <a class="secondary nav-link" href="/">Voir le site</a>
        <a class="secondary nav-link" href="/admin">Annonces</a>
        <div class="api-status" id="apiStatus">Connexion...</div>
        <button class="secondary hidden" id="logoutButton" type="button">Deconnexion</button>
      </div>
    </header>

    <main class="layout admin-requests-layout">
      <section class="panel login-panel" id="loginPanel">
        <div class="section-heading">
          <h2>Connexion admin</h2>
        </div>

        <form id="loginForm">
          <label>
            Email
            <input id="adminEmail" type="email" value="admin@beeconsulting.local" required />
          </label>

          <label>
            Mot de passe
            <input id="adminPassword" type="password" value="admin123" required />
          </label>

          <button class="primary" type="submit">Se connecter</button>
          <p class="form-message" id="loginMessage"></p>
        </form>
      </section>

      <section class="panel requests-panel dashboard-panel">
        <div class="section-heading">
          <div>
            <h2>Demandes recues</h2>
            <p id="requestCount">0 demande</p>
          </div>
          <button class="secondary" id="refreshRequestsButton" type="button">Actualiser</button>
        </div>

        <div class="requests-list" id="requestsList"></div>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="/requests.js"></script>
  </body>
</html>
